<svg viewBox="0 0 132 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ProcessBI analytics chart">
  <defs>
    <linearGradient id="hcBar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#2E6BF6"/>
      <stop offset="1" stop-color="#46D5FF"/>
    </linearGradient>
    <linearGradient id="hcLine" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#46D5FF"/>
      <stop offset="1" stop-color="#86E6FF"/>
    </linearGradient>
    <filter id="hcGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hcGlowBig" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Bars — bright gradient, glow filter -->
  <rect x="12" y="78" width="17" height="26" rx="4" fill="url(#hcBar)" filter="url(#hcGlow)" opacity="0.9"/>
  <rect x="37" y="60" width="17" height="44" rx="4" fill="url(#hcBar)" filter="url(#hcGlow)" opacity="0.92"/>
  <rect x="62" y="38" width="17" height="66" rx="4" fill="url(#hcBar)" filter="url(#hcGlow)" opacity="0.95"/>
  <rect x="87" y="16" width="17" height="88" rx="4" fill="url(#hcBar)" filter="url(#hcGlow)"/>

  <!-- Trend line -->
  <path d="M20.5 78 L45.5 60 L70.5 38 L95.5 16 L122 5" fill="none" stroke="url(#hcLine)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#hcGlow)"/>
  <!-- Arrow -->
  <path d="M122 5 L109 6.5 M122 5 L120.5 18" fill="none" stroke="#86E6FF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#hcGlow)"/>

  <!-- Node circles — same design as logo-animated.svg -->
  <g filter="url(#hcGlowBig)">
    <circle cx="20.5" cy="78" r="9" fill="#46D5FF" opacity="0.2"/>
    <circle cx="20.5" cy="78" r="5.5" fill="#06182F" stroke="#46D5FF" stroke-width="2.5"/>
    <circle cx="20.5" cy="78" r="2.2" fill="#86E6FF"/>
  </g>
  <g filter="url(#hcGlowBig)">
    <circle cx="45.5" cy="60" r="9" fill="#46D5FF" opacity="0.2"/>
    <circle cx="45.5" cy="60" r="5.5" fill="#06182F" stroke="#46D5FF" stroke-width="2.5"/>
    <circle cx="45.5" cy="60" r="2.2" fill="#86E6FF"/>
  </g>
  <g filter="url(#hcGlowBig)">
    <circle cx="70.5" cy="38" r="9" fill="#00C2FF" opacity="0.2"/>
    <circle cx="70.5" cy="38" r="5.5" fill="#06182F" stroke="#00C2FF" stroke-width="2.5"/>
    <circle cx="70.5" cy="38" r="2.2" fill="#ffffff"/>
  </g>
  <g filter="url(#hcGlowBig)">
    <circle cx="95.5" cy="16" r="9" fill="#46D5FF" opacity="0.25"/>
    <circle cx="95.5" cy="16" r="5.5" fill="#06182F" stroke="#46D5FF" stroke-width="2.5"/>
    <circle cx="95.5" cy="16" r="2.2" fill="#ffffff"/>
  </g>
</svg>